<main class="app-container">
  <header>
    <h1>Price Compare</h1>
    <p>Find the best value by comparing price per ounce.</p>
  </header>

  <div class="actions">
    @if (items.length < 6) {
      <button class="btn-add" (click)="addItem()">
        <span>+</span> Add Item
      </button>
    }
    <button class="btn-reset" (click)="resetItems()" aria-label="Reset comparison">
      <span>⟲</span> Reset
    </button>
  </div>

  <div class="items-grid">
    @for (item of items; track item.id; let i = $index) {
      <app-item-card
        [item]="item"
        [pricePerOz]="getPricePerOz(item)"
        [rankInfo]="getItemRankInfo(item.id)"
        [rankText]="getItemRankInfo(item.id) ? getRankText(getItemRankInfo(item.id)!) : ''"
        [canRemove]="items.length > 2"
        [units]="units"
        (remove)="removeItem(i)">
      </app-item-card>
    }
  </div>
</main>
<router-outlet></router-outlet>
