<main class="app-container">
  <header>
    <h1>Price Compare</h1>
    <p>Find the best value by comparing price per ounce.</p>
  </header>

  <div class="items-grid">
    @for (item of items; track item.id; let i = $index) {
      <app-item-card
        [item]="item"
        [pricePerOz]="getPricePerOz(item)"
        [rankInfo]="getItemRankInfo(item.id)"
        [rankText]="getItemRankInfo(item.id) ? getRankText(getItemRankInfo(item.id)!) : ''"
        [canRemove]="items.length > 2"
        [units]="units"
        (remove)="removeItem(i)">
      </app-item-card>
    }
  </div>

  @if (items.length < 6) {
    <div class="actions">
      <button class="btn-add" (click)="addItem()">
        <span>+</span> Add Item
      </button>
    </div>
  }
</main>
<router-outlet></router-outlet>
