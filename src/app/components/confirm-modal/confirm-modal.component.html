<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content {{ theme }}" (click)="$event.stopPropagation()">
    <div class="icon-header">
      @if (theme === 'danger') {
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      } @else if (theme === 'success') {
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      }
      <h2>{{ title }}</h2>
    </div>
    
    <p class="description" [innerHTML]="message"></p>

    <div class="modal-actions">
      @if (!hideCancel) {
        <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      }
      <button class="btn-confirm" (click)="onConfirm()">{{ confirmText }}</button>
    </div>
  </div>
</div>
