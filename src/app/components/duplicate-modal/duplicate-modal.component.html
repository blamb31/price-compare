<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="icon-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      <h2>Duplicate Item Found</h2>
    </div>
    
    <p class="description">
      There is already an item named <strong>"{{ itemName }}"</strong> from <strong>"{{ storeName }}"</strong> in your saved items.
    </p>
    <p class="prompt">What would you like to do?</p>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="onCancel()">{{ cancelText }}</button>
      <div class="action-group">
        <button class="btn-duplicate" (click)="onAddDuplicate()">Add Duplicate</button>
        <button class="btn-replace" (click)="onReplace()">Replace Existing</button>
      </div>
    </div>
  </div>
</div>
