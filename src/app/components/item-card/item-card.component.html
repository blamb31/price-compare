<div class="item-card" [class.best-value]="rankInfo?.rank === 1">
  @if (rankInfo) {
    <div class="rank-badge" [class]="'rank-' + rankInfo.rank + (rankInfo.isMostExpensive ? ' most-expensive' : '')">
      {{ rankText }}
    </div>
  }
  <div class="card-header" [class.has-badge]="rankInfo !== null">
    <span class="price-per-oz">
      @if (pricePerOz !== null) {
        {{ pricePerOz | currency:'USD':'symbol': (pricePerOz < 1 ? '1.3-3' : '1.2-2') }} <small>/ oz</small>
      } @else {
        <span class="placeholder">-</span>
      }
    </span>
    <div class="actions-group">
      <button class="icon-btn save-btn" (click)="onSaveRequested()" aria-label="Save item" title="Save this item">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      </button>
      @if (canRemove) {
        <button class="icon-btn remove-btn" (click)="onRemove()" aria-label="Remove item" title="Remove">&times;</button>
      }
    </div>
  </div>

  <div class="input-group row-group">
    <div class="name-col">
      <input 
        type="text" 
        id="name-{{item.id}}" 
        [(ngModel)]="item.name"
        class="title-input"
        placeholder="Item Name">
    </div>
    <div class="brand-col">
      <input 
        type="text" 
        id="brand-{{item.id}}" 
        [(ngModel)]="item.brand"
        class="title-input brand-input"
        placeholder="Brand">
    </div>
  </div>

  <div class="input-group">
    <label for="price-{{item.id}}">Price</label>
    <div class="input-with-symbol">
      <span class="symbol">$</span>
      <input 
        #priceInput
        type="number" 
        id="price-{{item.id}}" 
        [(ngModel)]="item.price"
        placeholder="0.00" 
        min="0" 
        step="0.01"
        (input)="onPriceInput($event)"
        (blur)="onPriceBlur($event)">
    </div>
  </div>

  <div class="input-group row-group">
    <div class="weight-col">
      <label for="weight-{{item.id}}">Weight or Volume</label>
      <input 
        type="number" 
        id="weight-{{item.id}}" 
        [(ngModel)]="item.weight"
        placeholder="0" 
        min="0" 
        step="0.01">
    </div>
    <div class="unit-col">
      <label for="unit-{{item.id}}">Unit</label>
      <select id="unit-{{item.id}}" [(ngModel)]="item.unit">
        @for (u of units; track u.label) {
          <option [value]="u.label">{{ u.label }}</option>
        }
      </select>
    </div>
  </div>
</div>
