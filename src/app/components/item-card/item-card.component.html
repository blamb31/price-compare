<div class="item-card" [class.best-value]="rankInfo?.rank === 1">
  @if (rankInfo) {
    <div class="rank-badge" [class]="'rank-' + rankInfo.rank + (rankInfo.isMostExpensive ? ' most-expensive' : '')">
      {{ rankText }}
    </div>
  }
  <div class="card-header" [class.has-badge]="rankInfo !== null">
    <span class="price-per-oz">
      @if (pricePerOz !== null) {
        {{ pricePerOz | currency:'USD':'symbol': (pricePerOz < 1 ? '1.3-3' : '1.2-2') }} <small>/ oz</small>
      } @else {
        <span class="placeholder">Enter details</span>
      }
    </span>
    @if (canRemove) {
      <button class="remove-btn" (click)="onRemove()" aria-label="Remove item">&times;</button>
    }
  </div>

  <div class="input-group">
    <label for="price-{{item.id}}">Price</label>
    <div class="input-with-symbol">
      <span class="symbol">$</span>
      <input 
        type="number" 
        id="price-{{item.id}}" 
        [(ngModel)]="item.price"
        placeholder="0.00" 
        min="0" 
        step="0.01">
    </div>
  </div>

  <div class="input-group row-group">
    <div class="weight-col">
      <label for="weight-{{item.id}}">Weight or Volume</label>
      <input 
        type="number" 
        id="weight-{{item.id}}" 
        [(ngModel)]="item.weight"
        placeholder="0" 
        min="0" 
        step="0.01">
    </div>
    <div class="unit-col">
      <label for="unit-{{item.id}}">Unit</label>
      <select id="unit-{{item.id}}" [(ngModel)]="item.unit">
        @for (u of units; track u.label) {
          <option [value]="u.label">{{ u.label }}</option>
        }
      </select>
    </div>
  </div>
</div>
